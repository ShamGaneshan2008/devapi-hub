{% extends "base.html" %}
{% block title %}Rate {{ api.name }} — DevAPI Hub{% endblock %}

{% block content %}
<div class="page">
  <div style="max-width:480px; margin:0 auto;">

    <a href="/api/{{ api.id }}" class="text-dim font-mono text-xs" style="text-decoration:none;">← Back to {{ api.name }}</a>

    <div class="stagger" style="margin: 1.5rem 0 2rem;">
      <h1>Rate this API</h1>
      <p class="text-muted text-sm mt-1">{{ api.name }} · current avg: {{ api.rating }}/5</p>
    </div>

    <div class="card reveal">
      <form method="POST">
        <div class="form-group">
          <label>Select a rating</label>

          <div class="flex gap-2" style="margin:1rem 0; justify-content:center;">
            {% for i in [1,2,3,4,5] %}
            <label style="cursor:pointer; text-align:center;">
              <input type="radio" name="rating" value="{{ i }}" required style="display:none;"/>
              <span class="star-opt" data-val="{{ i }}"
                style="font-size:2.5rem; display:block; cursor:pointer; transition:transform 0.15s, filter 0.15s; filter:grayscale(0.6) opacity(0.5);">★</span>
              <span style="font-size:0.7rem; font-family:var(--mono); color:var(--text3);">{{ i }}</span>
            </label>
            {% endfor %}
          </div>
        </div>

        <div class="flex gap-1 mt-2">
          <button type="submit" class="btn btn-primary">Submit →</button>
          <a href="/api/{{ api.id }}" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>

<style>
  input[type=radio]:checked ~ * .star-opt,
  .star-opt.lit {
    filter: none !important;
    transform: scale(1.15);
    color: var(--yellow);
    text-shadow: 0 0 12px rgba(255,215,0,0.5);
  }
</style>

<script>
  document.querySelectorAll('.star-opt').forEach(star => {
    star.parentElement.querySelector('input').addEventListener('change', () => {
      const val = parseInt(star.dataset.val);
      document.querySelectorAll('.star-opt').forEach(s => {
        const sv = parseInt(s.dataset.val);
        s.style.filter = sv <= val ? 'none' : 'grayscale(0.6) opacity(0.5)';
        s.style.transform = sv <= val ? 'scale(1.12)' : 'scale(1)';
        s.style.color = sv <= val ? 'var(--yellow)' : '';
        s.style.textShadow = sv <= val ? '0 0 12px rgba(255,215,0,0.5)' : '';
      });
    });
    star.addEventListener('mouseover', () => {
      const val = parseInt(star.dataset.val);
      document.querySelectorAll('.star-opt').forEach(s => {
        const sv = parseInt(s.dataset.val);
        s.style.filter = sv <= val ? 'none' : 'grayscale(0.6) opacity(0.4)';
        s.style.color = sv <= val ? 'var(--yellow)' : '';
      });
    });
  });
  document.querySelector('form').addEventListener('mouseleave', () => {
    const checked = document.querySelector('input[name=rating]:checked');
    const val = checked ? parseInt(checked.value) : 0;
    document.querySelectorAll('.star-opt').forEach(s => {
      const sv = parseInt(s.dataset.val);
      s.style.filter = sv <= val ? 'none' : 'grayscale(0.6) opacity(0.5)';
      s.style.color = sv <= val ? 'var(--yellow)' : '';
    });
  });
</script>
{% endblock %}
