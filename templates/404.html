{% extends "base.html" %}
{% block title %}Not Found — DevAPI Hub{% endblock %}

{% block content %}
<div class="page" style="text-align:center; padding-top:6rem;">
  <div class="stagger">
    <div style="font-size:5rem; margin-bottom:1rem; opacity:0.3; font-family:var(--mono);">404</div>
    <h1 class="gradient-text" style="font-size:2rem;">Page Not Found</h1>
    <p class="text-muted text-sm mt-2" style="max-width:380px; margin:0 auto;">
      {{ message or "The page you're looking for doesn't exist or was moved." }}
    </p>
    <div class="flex gap-1 mt-3" style="justify-content:center;">
      <a href="/" class="btn btn-primary">Go Home →</a>
      <a href="/dashboard" class="btn btn-ghost">Dashboard</a>
    </div>
  </div>
</div>
{% endblock %}
